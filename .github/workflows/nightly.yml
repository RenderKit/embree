  nightly-linux-DEBUG-CLANG-SSE2-NAMESPACE:
    secrets: inherit
    uses: intel-innersource/libraries.devops.renderkit.workflows/.github/workflows/docker.yml@main
    with:
      image: embree/fedora:42
      cmd: |
        opts="-DCMAKE_BUILD_TYPE=RelWithDebInfo"
        opts+=" -DBUILD_TESTING=ON"
        opts+=" -DEMBREE_TUTORIALS=ON"
        opts+=" -DEMBREE_TESTING_INTENSITY=4"
        opts+=" -DEMBREE_MAX_ISA=SSE2"
        opts+=" -DEMBREE_MAX_INSTANCE_LEVEL_COUNT=8"
        opts+=" -DEMBREE_API_NAMESPACE=myembree"
        opts+=" -DEMBREE_LIBRARY_NAME=myembree"
        opts+=" -DEMBREE_INSTALL_DEPENDENCIES=ON"
        opts+=" -DEMBREE_TESTING_INSTALL_TESTS=ON"
        opts+=" -DCMAKE_INSTALL_TESTDIR=testing"
        opts+=" -DEMBREE_ZIP_MODE=ON"
        opts+=" -DCMAKE_C_COMPILER=clang"
        opts+=" -DCMAKE_CXX_COMPILER=clang++"

        cmake -S superbuild -B build -D EMBREE_EXTRA_OPTIONS="$opts"
        cmake --build build --config RelWithDebInfo
        cmake --build build/embree/build --config RelWithDebInfo --target build
        cp build/embree/build/embree-*.tar.gz build/

        # Merge binaries & testing packages
        dest="./build/embree-release"
        mkdir -p "$dest"
        for archive in ./build/*.tar.gz; do
          tar -xzf "$archive" -C "$dest"
        done

        # Run testing
        cd $dest
        cmake -S testing -B build
        cd build
        ctest -C RelWithDebInfo --output-on-failure -VV

